<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SŌUL — Caisse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --yellow: #F2EA3C; --black: #0A0A0A; --white: #FFFFFF; --light: #F5F5F5; --text-muted: #888; --border: #E0E0E0; --green: #1a7a4a; }
    body { background: var(--white); color: var(--black); font-family: 'Montserrat', sans-serif; min-height: 100vh; padding-bottom: 40px; }

    .header { background: var(--white); padding: 20px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .header-logo { height: 32px; width: auto; }
    .header-links { display: flex; gap: 20px; }
    .header-links a { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; }
    .header-links a:hover { color: var(--black); }

    .hero-band { background: var(--yellow); padding: 14px 20px; }
    .hero-text { font-size: 13px; font-weight: 900; font-style: italic; color: var(--white); text-transform: uppercase; letter-spacing: 0.05em; }

    .scanner-section { padding: 24px 20px 16px; }
    .section-title { font-size: 9px; font-weight: 800; letter-spacing: 0.3em; text-transform: uppercase; color: var(--black); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #reader { border: 1.5px solid var(--border); overflow: hidden; max-width: 100%; background: var(--light); }
    #reader video { display: block; }

    .scan-alt { margin-top: 12px; display: flex; gap: 8px; }
    .scan-alt input { flex: 1; padding: 12px 14px; background: var(--white); border: 1.5px solid var(--border); color: var(--black); font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; outline: none; text-transform: uppercase; }
    .scan-alt input:focus { border-color: var(--black); }
    .scan-alt button { padding: 12px 20px; background: var(--black); color: var(--yellow); border: none; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 800; font-style: italic; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
    .scan-hint { font-size: 10px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }

    #client-card { display: none; margin: 16px 20px 0; background: var(--light); border-left: 4px solid var(--yellow); padding: 24px; }
    .client-name { font-size: clamp(24px, 7vw, 36px); font-weight: 900; font-style: italic; color: var(--black); text-transform: uppercase; letter-spacing: -0.02em; margin-bottom: 4px; }
    .client-visits { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 20px; }

    .discount-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--yellow); color: var(--white); padding: 10px 16px; font-size: 12px; font-weight: 900; font-style: italic; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }

    .tx-section { margin-bottom: 20px; }
    .tx-label { font-size: 9px; font-weight: 800; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--white); border: 1.5px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
    .tx-item.selected { border-color: var(--black); }
    .tx-products { font-size: 13px; font-weight: 600; color: var(--black); }
    .tx-meta { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 2px; }
    .tx-amount { font-size: 16px; font-weight: 800; color: var(--black); }

    .btn-validate { width: 100%; padding: 18px; background: var(--black); color: var(--yellow); border: none; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 900; font-style: italic; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; margin-bottom: 10px; }
    .btn-validate:hover { opacity: 0.85; }
    .btn-validate:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-cancel { width: 100%; padding: 13px; background: transparent; color: var(--text-muted); border: 1.5px solid var(--border); font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--black); color: var(--yellow); padding: 14px 28px; font-size: 12px; font-weight: 800; font-style: italic; letter-spacing: 0.1em; text-transform: uppercase; display: none; z-index: 999; }
  </style>
</head>
<body>

  <div class="header">
    <img src="/SOUL_LOGO_noir.png" alt="SŌUL" class="header-logo">
    <div class="header-links">
      <a href="/admin">Admin</a>
      <a href="/caisse/logout">Déconnexion</a>
    </div>
  </div>

  <div class="hero-band">
    <p class="hero-text">Scanner la carte client</p>
  </div>

  <div class="scanner-section">
    <p class="section-title">Caméra</p>
    <div id="reader"></div>
    <div class="scan-alt">
      <input type="text" id="manual-input" placeholder="Code à 4 caractères…" maxlength="4">
      <button onclick="manualScan()">OK</button>
    </div>
    <p class="scan-hint">Code de secours imprimé sur la carte du client</p>
  </div>

  <div id="client-card">
    <p class="client-name" id="client-name">—</p>
    <p class="client-visits" id="client-visits">—</p>
    <div class="discount-badge">✓ −10% à appliquer en caisse</div>

    <div class="tx-section" id="tx-section">
      <p class="tx-label">Transaction SumUp la plus proche</p>
      <div class="tx-list" id="tx-list"></div>
    </div>

    <button class="btn-validate" id="btn-validate" onclick="validateVisit()">✓ Valider la visite →</button>
    <button class="btn-cancel" onclick="resetScanner()">Annuler — nouveau scan</button>
  </div>

  <div id="toast">Visite enregistrée ✓</div>

  <script>
    let currentClient = null;
    let selectedTx = null;
    let scanner = null;

    function initScanner() {
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        () => {}
      ).catch(() => {
        document.getElementById('reader').innerHTML = '<p style="color:#888;font-size:12px;padding:20px;text-align:center;font-family:Montserrat,sans-serif">Caméra non disponible — utilisez la saisie manuelle.</p>';
      });
    }

    function onScanSuccess(decodedText) {
      let qrCode = decodedText;
      const match = decodedText.match(/\/api\/client\/([a-f0-9-]{36})/);
      if (match) qrCode = match[1];
      lookupClient(qrCode);
    }

    function manualScan() {
      const val = document.getElementById('manual-input').value.trim();
      if (!val) return;
      lookupClient(val);
    }

    async function lookupClient(code) {
      try {
        const res = await fetch(`/caisse/scan/${code}`);
        const data = await res.json();
        if (!res.ok) { alert(data.error || 'Carte non reconnue.'); return; }

        currentClient = data.client;
        selectedTx = null;

        document.getElementById('client-name').textContent = `${data.client.first_name} ${data.client.last_name}`;
        const visits = data.client.visit_count;
        document.getElementById('client-visits').textContent = visits === 0
          ? 'Première visite'
          : `${visits} visite${visits > 1 ? 's' : ''} — dernière le ${formatDate(data.client.last_visit)}`;

        renderTransactions(data.recentTransactions, data.scanTime);

        if (scanner) scanner.stop().catch(() => {});
        document.getElementById('client-card').style.display = 'block';
        document.getElementById('client-card').scrollIntoView({ behavior: 'smooth' });
      } catch (e) {
        alert('Erreur de connexion.');
      }
    }

    function renderTransactions(txList, scanTimeStr) {
      const section = document.getElementById('tx-section');
      const container = document.getElementById('tx-list');

      if (!txList || txList.length === 0) {
        // Masquer complètement la section si aucune transaction
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';

      const scanDt = new Date(scanTimeStr);
      const sorted = txList.slice().sort((a, b) => {
        const dtA = new Date(a.timestamp || a.created_at);
        const dtB = new Date(b.timestamp || b.created_at);
        const afterA = dtA >= scanDt;
        const afterB = dtB >= scanDt;
        // Prioriser les transactions APRÈS le scan
        if (afterA && !afterB) return -1;
        if (!afterA && afterB) return 1;
        // Parmi celles après, la plus proche du scan en premier
        return Math.abs(dtA - scanDt) - Math.abs(dtB - scanDt);
      });
      container.innerHTML = '';
      sorted.forEach((tx, i) => {
        const dt = new Date(tx.timestamp || tx.created_at);
        const diffSec = Math.round(Math.abs(dt - scanDt) / 1000);
        const diffStr = diffSec < 60 ? `${diffSec}s après scan` : `${Math.round(diffSec/60)}min après scan`;
        const el = document.createElement('div');
        el.className = 'tx-item' + (i === 0 ? ' selected' : '');
        el.innerHTML = `
          <div>
            <div class="tx-products">${tx.product_summary || tx.description || 'Transaction'}</div>
            <div class="tx-meta">${formatTime(dt)} · ${diffStr}</div>
          </div>
          <div class="tx-amount">${tx.amount}€</div>`;
        el.onclick = () => {
          document.querySelectorAll('.tx-item').forEach(e => e.classList.remove('selected'));
          el.classList.add('selected');
          selectedTx = tx;
        };
        if (i === 0) selectedTx = tx;
        container.appendChild(el);
      });
    }

    async function validateVisit() {
      if (!currentClient) return;
      const btn = document.getElementById('btn-validate');
      btn.disabled = true;
      btn.textContent = 'Enregistrement…';
      try {
        const res = await fetch('/caisse/valider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            client_id: currentClient.id,
            sumup_transaction_id: selectedTx?.id || null,
            sumup_amount: selectedTx?.amount || null,
            sumup_products: selectedTx?.product_summary || selectedTx?.description || null
          })
        });
        if (res.ok) { showToast('Visite enregistrée ✓'); setTimeout(resetScanner, 1800); }
      } catch (e) {
        alert('Erreur lors de la validation.');
        btn.disabled = false;
        btn.textContent = '✓ Valider la visite →';
      }
    }

    function resetScanner() {
      currentClient = null; selectedTx = null;
      document.getElementById('client-card').style.display = 'none';
      document.getElementById('manual-input').value = '';
      document.getElementById('btn-validate').disabled = false;
      document.getElementById('btn-validate').textContent = '✓ Valider la visite →';
      initScanner();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2000);
    }

    function formatDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
    }
    function formatTime(dt) {
      return dt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('scan')) lookupClient(params.get('scan'));
    initScanner();
  </script>
</body>
</html>
