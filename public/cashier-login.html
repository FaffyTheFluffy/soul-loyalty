<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUL — Accès Caisse</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #F7F3EE; --espresso: #1C1410; --caramel: #C8894A; --latte: #D9BFA0; --text-soft: #6B5D52; }
    body { background: var(--espresso); color: var(--cream); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { max-width: 340px; width: 100%; text-align: center; }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--latte); }
    .divider { width: 32px; height: 1px; background: var(--caramel); margin: 16px auto; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 4px; }
    .sub { font-size: 12px; color: var(--latte); margin-bottom: 40px; }
    input[type="password"] { width: 100%; padding: 14px 0; border: none; border-bottom: 1px solid #3d2e26; background: transparent; color: var(--cream); font-family: 'Inter', sans-serif; font-size: 16px; text-align: center; letter-spacing: 0.15em; outline: none; transition: border-color 0.2s; }
    input[type="password"]:focus { border-bottom-color: var(--caramel); }
    input::placeholder { color: #3d2e26; letter-spacing: 0.05em; font-size: 13px; }
    .btn { margin-top: 32px; width: 100%; padding: 16px; background: var(--caramel); color: var(--espresso); border: none; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; }
    .error { color: #ff8a80; font-size: 12px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Soul Coffee</p>
    <div class="divider"></div>
    <h1>Accès caisse</h1>
    <p class="sub">Réservé au personnel</p>
    <form method="POST" action="/caisse/login">
      <input type="password" name="password" placeholder="Mot de passe" autofocus>
      <button type="submit" class="btn">Entrer</button>
      <p class="error" id="err" style="display:none">Mot de passe incorrect.</p>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error')) document.getElementById('err').style.display = 'block';
  </script>
</body>
</html>
